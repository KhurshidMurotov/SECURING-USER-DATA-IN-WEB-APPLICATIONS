{% extends 'base.html' %}

{% block title %}Email Verified - Secure Web Application{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8 text-center">
        <h2 class="text-2xl font-bold text-gray-900 mb-4">Email Verified</h2>
        <p class="text-gray-700 mb-6">
            Your email address has been verified successfully.
            You can now log in to your account.
        </p>
        <a href="{% url 'accounts:login' %}" class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
            Go to Login
        </a>
    </div>
</div>
{% endblock %}
